# HTML iframe Element Practice

**Day 16/100** of #100DaysOfCode

### What I Learned Today
Practiced using the `<iframe>` element to embed external content in HTML.

### Key Concepts
- `src` - URL of the content to embed
- `title` - Describes the iframe for accessibility 
- `width` & `height` - Sets the size of the iframe
- Used with semantic tags like `<section>` and `<h2>`

### Example Code
```html
<iframe 
  src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
  title="Example Video" 
  width="560" 
  height="315">
</iframe>
