## Day 23 - Specialized Semantic Elements

**Topic:** HTML5 Semantic Elements
**Project:** N/A - Concept building day

### What I learned today:
- Replaced generic `<div>` with `<header>`, `<main>`, `<footer>`, `<section>`, `<article>`
- Used `<nav>` for navigation links, `<aside>` for side content
- `<figure>` + `<figcaption>` for self-contained media
- `<time datetime="2026-06-24">` for machine-readable dates
- `<mark>` to highlight text, `<details>` + `<summary>` for accordions

### Key Takeaway:
Semantic HTML = Code that explains itself. Better for SEO, accessibility, and future-me maintenance.
